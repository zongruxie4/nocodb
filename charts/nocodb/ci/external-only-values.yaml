# Values used by chart-testing (ct install) in CI. The CI job provisions throwaway
# in-cluster Postgres and Redis and injects connection strings via a pre-created Secret.
replicaCount: 1
worker:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
externalDatabase:
  existingSecret: nocodb-ci
externalRedis:
  existingSecret: nocodb-ci
auth:
  existingSecret: nocodb-ci
resources:
  requests:
    cpu: 100m
    memory: 256Mi
startupProbe:
  failureThreshold: 60
