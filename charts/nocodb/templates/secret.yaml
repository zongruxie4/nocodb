{{- $manageDb := not .Values.externalDatabase.existingSecret -}}
{{- $manageRedis := and (include "nocodb.redisConfigured" .) (not .Values.externalRedis.existingSecret) -}}
{{- $manageAuth := not .Values.auth.existingSecret -}}
{{- $manageSmtp := and .Values.smtp.enabled .Values.smtp.password (not .Values.smtp.existingSecret) -}}
{{- $manageSentry := and .Values.monitoring.sentry.enabled .Values.monitoring.sentry.dsn (not .Values.monitoring.sentry.existingSecret) -}}
{{- if or $manageDb $manageRedis $manageAuth $manageSmtp $manageSentry -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nocodb.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nocodb.labels" . | nindent 4 }}
  annotations:
    {{- include "nocodb.annotations" (dict "context" . "extraAnnotations" (dict "helm.sh/resource-policy" "keep")) | nindent 4 }}
type: Opaque
data:
  {{- if $manageDb }}
  DATABASE_URL: {{ include "nocodb.dbUrl" . | b64enc | quote }}
  {{- end }}
  {{- if $manageRedis }}
  NC_REDIS_URL: {{ include "nocodb.redisUrl" . | b64enc | quote }}
  {{- end }}
  {{- if $manageAuth }}
  NC_AUTH_JWT_SECRET: {{ include "nocodb.jwtSecret" . | b64enc | quote }}
  NC_CONNECTION_ENCRYPT_KEY: {{ include "nocodb.encryptionKey" . | b64enc | quote }}
  {{- end }}
  {{- if $manageSmtp }}
  NC_SMTP_PASSWORD: {{ .Values.smtp.password | b64enc | quote }}
  {{- end }}
  {{- if $manageSentry }}
  NC_SENTRY_DSN: {{ .Values.monitoring.sentry.dsn | b64enc | quote }}
  {{- end }}
{{- end }}
